      <article class="article-body"><h1>단점 개선 프로젝트 투자 기록</h1>
<h2>프로젝트 방향</h2>
<h3>목표</h3>
<p>투자에서 감정과 FOMO를 줄이고, 종목을 오래 보유할 수 있는 <strong>분석 기준·매수 원칙·복기 루틴</strong>을 만든다.</p>
<h3>기본 원칙</h3>
<ul>
<li>나스닥/코스피는 <strong>일봉 기준</strong>으로 확인한다.</li>
<li>하루~일주일 단위 초단타 매매는 줄인다.</li>
<li>암호화폐는 일반 관심종목 목록에서 제외한다.</li>
<li>유튜브/텔레그램은 <strong>후보 발굴용</strong>으로만 사용한다.</li>
<li>매수 판단은 <strong>사업 구조·숫자·수급·자리</strong>로 결정한다.</li>
</ul></article>
